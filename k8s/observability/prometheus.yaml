apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: project
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector.project.svc.cluster.local:8889']
      - job_name: 'api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['project']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: api
            action: keep
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.project.svc.cluster.local:9093']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.52.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=15d"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: project
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
# AlertManager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        ports:
        - containerPort: 9093
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: project
spec:
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
